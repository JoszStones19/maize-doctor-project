name: maize_doctor
description: AI-powered maize leaf disease classifier
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  google_sign_in: ^6.2.1
  go_router: ^14.0.0
  provider: ^6.1.2
  dio: ^5.4.3
  image_picker: ^1.1.2
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.1.1
  tflite_flutter: ^0.12.1
  image: ^4.1.7
  google_fonts: ^6.3.2
  url_launcher: ^6.3.0
  webview_flutter: ^4.7.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/
    - assets/images/